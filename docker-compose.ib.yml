services:
  db:
    image: mysql:8.0
    container_name: ${STACK_NAME}_db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: sandbox
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${STACK_NAME}_php
    volumes:
      - ./backend:/var/www/html
    ports:
      - "${WEB_PORT}:8000"
    command: >
      sh -c "
        php artisan serve --host=0.0.0.0 --port=8000 2>&1 &
        while true; do
          php artisan schedule:run --verbose >> /var/www/html/storage/logs/schedule.log 2>&1
          sleep 60
        done
      "
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sandbox
      - DB_USERNAME=root
      - DB_PASSWORD=
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: ${STACK_NAME}_frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:${WEB_PORT}/api
    depends_on:
      - php
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
