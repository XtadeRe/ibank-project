services:
  webserver:
    image: nginx:alpine
    container_name: ${STACK_NAME}_webserver
    ports:
      - "${WEB_PORT:-8080-8180}:80"
    volumes:
      - ./backend:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${STACK_NAME}_php
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_DATABASE=sandbox
      - DB_USERNAME=root
      - DB_PASSWORD=
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: ${STACK_NAME}_frontend
    ports:
      - "${FRONTEND_PORT:-3200-3300}:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:${WEB_PORT}/api
    depends_on:
      - php
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
