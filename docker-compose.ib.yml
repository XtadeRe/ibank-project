version: '3.8'

services:
  # Только интернет-банк (фронтенд)
  ibank:
    image: nginx:latest
    container_name: ${STACK_NAME}_ibank
    ports:
      - "${IB_PORT:-8080}:80"
    networks:
      - ibank-network
    restart: unless-stopped
    labels:
      - "sandbox=${STACK_NAME}"
      - "type=ibank"
