version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: ${STACK_NAME}_web
    ports:
      - "80"
    restart: unless-stopped

  app:
    image: nginx:alpine
    container_name: ${STACK_NAME}_app
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: ${STACK_NAME}_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sandbox
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    restart: unless-stopped
