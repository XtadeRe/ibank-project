version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: ${STACK_NAME}_web
    ports:
      - "80"
    restart: unless-stopped
    labels:
      - "version=develop"
      - "branch=develop"
      - "environment=development"

  app:
    image: nginx:alpine
    container_name: ${STACK_NAME}_app
    restart: unless-stopped
    labels:
      - "version=develop"
      - "branch=develop"
      - "environment=development"

  db:
    image: mysql:8.0
    container_name: ${STACK_NAME}_db
    environment:
      MYSQL_ROOT_PASSWORD: develop_password
      MYSQL_DATABASE: develop_db
      MYSQL_USER: developer
      MYSQL_PASSWORD: dev_pass
    restart: unless-stopped
    labels:
      - "version=develop"
      - "branch=develop"
      - "environment=development"
