version: '3.8'

services:
  web:
    image: nginx:stable
    container_name: ${STACK_NAME}_web
    ports:
      - "80"
    labels:
      - "version=1.0.0"
      - "branch=master"
      - "environment=production"
      - "release=stable"

  app:
    image: php:8.2-fpm
    container_name: ${STACK_NAME}_app
    labels:
      - "version=1.0.0"
      - "branch=master"
      - "environment=production"
      - "release=stable"

  db:
    image: mysql:8.0
    container_name: ${STACK_NAME}_db
    environment:
      MYSQL_ROOT_PASSWORD: secure_root_password
      MYSQL_DATABASE: production_db
      MYSQL_USER: prod_user
      MYSQL_PASSWORD: strong_password
    labels:
      - "version=1.0.0"
      - "branch=master"
      - "environment=production"
      - "release=stable"
