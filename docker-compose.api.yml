services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${STACK_NAME}_php
    volumes:
      - ./backend:/var/www/html
    ports:
      - "${WEB_PORT}:8000"
    command: >
      sh -c "
        php artisan serve --host=0.0.0.0 --port=8000 2>&1 &
        while true; do
          php artisan schedule:run --verbose >> /var/www/html/storage/logs/schedule.log 2>&1
          sleep 60
        done
      "
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sandbox
      - DB_USERNAME=root
      - DB_PASSWORD=
    networks:
      - app-network

networks:
  app-network:
    driver: bridge