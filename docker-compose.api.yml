version: '3.8'

services:
  # API сервер
  api:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ${STACK_NAME}_api
    volumes:
      - ./:/var/www/html
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_NAME}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - api-network
    restart: unless-stopped
    labels:
      - "sandbox=${STACK_NAME}"
      - "type=api"

  # База данных для API
  db:
    image: mysql:8.0
    container_name: ${STACK_NAME}_api_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - api_db_data:/var/lib/mysql
    networks:
      - api-network
    restart: unless-stopped
    labels:
      - "sandbox=${STACK_NAME}"
      - "type=db"

volumes:
  api_db_data:

networks:
  api-network:
    driver: bridge