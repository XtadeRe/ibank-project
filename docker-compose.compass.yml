version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: backend-java/Dockerfile
    container_name: ${STACK_NAME}_app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=compass_bank
      - DB_USER=root
      - DB_PASSWORD=
    depends_on:
      db:
        condition: service_healthy
    networks:
      - compass-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: ${STACK_NAME}_db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: compass_bank
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - compass-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: ${STACK_NAME}_phpmyadmin
    ports:
      - "${PMA_PORT:-9088}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    networks:
      - compass-network
    depends_on:
      - db
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: ${STACK_NAME}_web
    ports:
      - "${WEB_PORT:-8081}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - compass-network
    depends_on:
      - app
    restart: unless-stopped

networks:
  compass-network:
    driver: bridge

volumes:
  db_data: